<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Lily Bouquet AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #webcam {
            position: absolute;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            transform: scaleX(-1);
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let bouquetGrowth = 0.2;
        let bouquetBloom = 0.1;
        let targetGrowth = 0.2;
        let targetBloom = 0.1;

        const SMOOTHING_FACTOR = 0.07; 
        const particles = [];

        const lilies = [
            { xOffset: -140, heightMult: 1.3, curveSign: -1.3, delay: 0.0, scale: 0.75, angleOffset: -0.25, layer: 'back', colorType: 'white' },
            { xOffset: 140, heightMult: 1.3, curveSign: 1.3, delay: 0.05, scale: 0.75, angleOffset: 0.25, layer: 'back', colorType: 'pink' },
            { xOffset: -70, heightMult: 1.4, curveSign: -0.6, delay: 0.1, scale: 0.85, angleOffset: -0.12, layer: 'back', colorType: 'pink' },
            { xOffset: 70, heightMult: 1.4, curveSign: 0.6, delay: 0.12, scale: 0.85, angleOffset: 0.12, layer: 'back', colorType: 'white' },
            { xOffset: 0, heightMult: 1.45, curveSign: -0.1, delay: 0.15, scale: 0.9, angleOffset: -0.02, layer: 'back', colorType: 'pink' },
            
            { xOffset: -200, heightMult: 1.05, curveSign: -1.8, delay: 0.02, scale: 0.8, angleOffset: -0.38, layer: 'mid', colorType: 'white' },
            { xOffset: 200, heightMult: 1.05, curveSign: 1.8, delay: 0.08, scale: 0.8, angleOffset: 0.38, layer: 'mid', colorType: 'pink' },
            { xOffset: -100, heightMult: 1.15, curveSign: -0.9, delay: 0.07, scale: 0.9, angleOffset: -0.2, layer: 'mid', colorType: 'pink' },
            { xOffset: 100, heightMult: 1.15, curveSign: 0.9, delay: 0.09, scale: 0.9, angleOffset: 0.2, layer: 'mid', colorType: 'white' },
            { xOffset: 0, heightMult: 1.25, curveSign: 0.0, delay: 0.14, scale: 1.0, angleOffset: 0.0, layer: 'mid', colorType: 'white' },
            
            { xOffset: -110, heightMult: 0.85, curveSign: -1.0, delay: 0.03, scale: 0.85, angleOffset: -0.18, layer: 'front', colorType: 'pink' },
            { xOffset: 110, heightMult: 0.85, curveSign: 1.0, delay: 0.05, scale: 0.85, angleOffset: 0.18, layer: 'front', colorType: 'white' },
            { xOffset: -50, heightMult: 0.95, curveSign: -0.3, delay: 0.04, scale: 0.95, angleOffset: -0.08, layer: 'front', colorType: 'white' },
            { xOffset: 50, heightMult: 0.95, curveSign: 0.3, delay: 0.06, scale: 0.95, angleOffset: 0.08, layer: 'front', colorType: 'pink' },
            { xOffset: 0, heightMult: 0.8, curveSign: 0.1, delay: 0.16, scale: 0.95, angleOffset: 0.03, layer: 'front', colorType: 'pink' }
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720
        });
        camera.start();

        function getDistance(pt1, pt2) {
            return Math.hypot(pt1.x - pt2.x, pt1.y - pt2.y);
        }

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let maxPinchDist = 0;

                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];
                    const pinchDist = getDistance(thumbTip, indexTip);
                    
                    if (pinchDist > maxPinchDist) {
                        maxPinchDist = pinchDist;
                    }

                    ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
                    [4, 8].forEach(idx => {
                        const pt = landmarks[idx];
                        ctx.beginPath();
                        ctx.arc((1 - pt.x) * canvas.width, pt.y * canvas.height, 5, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                }

                let bloomVal = (maxPinchDist - 0.03) / 0.17;
                targetBloom = Math.min(Math.max(bloomVal, 0.05), 1.0);
                targetGrowth = Math.min(Math.max(bloomVal * 1.1, 0.2), 1.0);
            } else {
                targetBloom = 0.35;
                targetGrowth = 0.65;
            }

            bouquetGrowth += (targetGrowth - bouquetGrowth) * SMOOTHING_FACTOR;
            bouquetBloom += (targetBloom - bouquetBloom) * SMOOTHING_FACTOR;

            const bouquetBaseX = canvas.width / 2;
            const bouquetBaseY = canvas.height * 0.95;

            drawLilyBouquet(bouquetBaseX, bouquetBaseY);
        }

        function drawRealisticPetal(x, y, scale, rotation, bloomVal, colorType) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            
            const petalStretch = 1.0 + (1.0 - bloomVal) * 0.4;
            ctx.scale(scale * bloomVal, scale * bloomVal * petalStretch);

            const grad = ctx.createLinearGradient(0, 10, 0, -130);
            if (colorType === 'pink') {
                grad.addColorStop(0.0, '#ffd1dc');
                grad.addColorStop(0.2, '#ffb7c5');
                grad.addColorStop(0.5, '#ff8da1');
                grad.addColorStop(0.85, '#ff6b8b');
                grad.addColorStop(1.0, '#e03b62');
            } else {
                grad.addColorStop(0.0, '#e3eed4');
                grad.addColorStop(0.12, '#fcfdfa');
                grad.addColorStop(0.5, '#ffffff');
                grad.addColorStop(0.85, '#f3f7eb');
                grad.addColorStop(1.0, '#dbe6cb');
            }
            ctx.fillStyle = grad;

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-38, -35, -34, -95, -2, -125);
            ctx.bezierCurveTo(0, -126, 0, -126, 2, -125);
            ctx.bezierCurveTo(34, -95, 38, -35, 0, 0);
            ctx.closePath();
            ctx.fill();

            const centerPinkGrad = ctx.createLinearGradient(0, 0, 0, -85);
            if (colorType === 'pink') {
                centerPinkGrad.addColorStop(0, 'rgba(255, 182, 197, 0.8)');
                centerPinkGrad.addColorStop(0.3, 'rgba(219, 48, 105, 0.4)');
                centerPinkGrad.addColorStop(0.7, 'rgba(145, 10, 50, 0.15)');
                centerPinkGrad.addColorStop(1.0, 'rgba(255, 255, 255, 0.0)');
            } else {
                centerPinkGrad.addColorStop(0, 'rgba(230, 242, 213, 0.7)');
                centerPinkGrad.addColorStop(0.3, 'rgba(233, 110, 150, 0.28)');
                centerPinkGrad.addColorStop(0.7, 'rgba(233, 110, 150, 0.08)');
                centerPinkGrad.addColorStop(1.0, 'rgba(255, 255, 255, 0.0)');
            }
            ctx.fillStyle = centerPinkGrad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-14, -20, -12, -70, 0, -85);
            ctx.bezierCurveTo(12, -70, 14, -20, 0, 0);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = colorType === 'pink' ? '#c23d60' : '#99b374';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-1, -60, 0, -112);
            ctx.stroke();

            ctx.fillStyle = colorType === 'pink' ? '#800c28' : '#b64d6c';
            const raisedPoints = [
                {x: -6, y: -30}, {x: 5, y: -35}, {x: -3, y: -48}, 
                {x: 4, y: -55}, {x: -7, y: -62}, {x: 2, y: -72}
            ];
            ctx.globalAlpha = 0.85;
            raisedPoints.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.2, 0, 2 * Math.PI);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            ctx.restore();
        }

        function drawPistilAndStamens(x, y, angle, scale, bloomVal, colorType) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.scale(scale * bloomVal, scale * bloomVal);

            ctx.strokeStyle = colorType === 'pink' ? '#d46a84' : '#85ab52';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            
            const offsets = [-24, -12, 0, 12, 24];
            offsets.forEach(offsetAngle => {
                const rad = (offsetAngle * Math.PI) / 180;
                const targetX = Math.sin(rad) * 65;
                const targetY = -Math.cos(rad) * 65;
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(targetX * 0.25, targetY * 0.7, targetX, targetY);
                ctx.stroke();

                ctx.save();
                ctx.translate(targetX, targetY);
                ctx.rotate(rad + (Math.PI / 2));
                
                const antherGrad = ctx.createLinearGradient(-7, 0, 7, 0);
                antherGrad.addColorStop(0, '#592c00');
                antherGrad.addColorStop(0.5, '#ab5602');
                antherGrad.addColorStop(1, '#592c00');
                ctx.fillStyle = antherGrad;
                
                ctx.shadowColor = '#ab5602';
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.ellipse(0, 0, 7, 2.5, 0, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();
                ctx.shadowBlur = 0;
            });

            ctx.strokeStyle = colorType === 'pink' ? '#b04a62' : '#6d9438';
            ctx.lineWidth = 3.8;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-2, -35, 0, -78);
            ctx.stroke();
            
            ctx.fillStyle = colorType === 'pink' ? '#ffa6be' : '#9cb874';
            ctx.beginPath();
            ctx.arc(0, -78, 4.5, 0, 2 * Math.PI);
            ctx.fill();

            ctx.restore();
        }

        function drawSingleLily(baseX, baseY, lilyData) {
            const personalStemGrowth = Math.min(Math.max((bouquetGrowth - lilyData.delay) / (1.0 - lilyData.delay), 0.0), 1.0);
            if (personalStemGrowth <= 0) return;

            const personalBloom = Math.min(Math.max((bouquetBloom - lilyData.delay) / (1.0 - lilyData.delay), 0.0), 1.0);

            const totalStemLength = 400 * lilyData.heightMult;
            const currentStemLength = totalStemLength * personalStemGrowth;
            const endY = baseY - currentStemLength;
            const endX = baseX + lilyData.xOffset + (lilyData.curveSign * 35 * personalStemGrowth);

            ctx.shadowBlur = lilyData.layer === 'back' ? 5 : 12;
            ctx.shadowColor = lilyData.layer === 'back' ? 'rgba(20, 35, 10, 0.6)' : 'rgba(50, 80, 40, 0.4)';
            
            ctx.strokeStyle = lilyData.layer === 'back' ? '#27401a' : '#3e5e29';
            ctx.lineWidth = 9 * lilyData.scale;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(baseX + lilyData.xOffset * 0.3, baseY);
            const cp1x = baseX + lilyData.xOffset * 0.6 + (lilyData.curveSign * 20 * personalStemGrowth);
            const cp1y = baseY - currentStemLength * 0.4;
            const cp2x = endX - (lilyData.curveSign * 30 * personalStemGrowth);
            const cp2y = baseY - currentStemLength * 0.7;
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
            ctx.stroke();

            if (personalStemGrowth > 0.35) {
                ctx.fillStyle = lilyData.layer === 'back' ? '#1f3314' : '#314a1f';
                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                
                ctx.beginPath();
                ctx.ellipse(endX - 25 * lilyData.scale, endY + currentStemLength * 0.35, 42 * lilyData.scale * personalStemGrowth, 7 * lilyData.scale * personalStemGrowth, -Math.PI / 6, 0, 2 * Math.PI);
                ctx.fill();

                ctx.beginPath();
                ctx.ellipse(endX + 25 * lilyData.scale, endY + currentStemLength * 0.2, 47 * lilyData.scale * personalStemGrowth, 8 * lilyData.scale * personalStemGrowth, Math.PI / 5, 0, 2 * Math.PI);
                ctx.fill();
            }

            if (personalStemGrowth > 0.18 && personalBloom > 0.02) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = lilyData.colorType === 'pink' ? 'rgba(255, 180, 200, 0.4)' : 'rgba(240, 255, 230, 0.4)';

                const receptacleY = endY + 8 * lilyData.scale;
                ctx.fillStyle = '#3e5e29';
                ctx.beginPath();
                ctx.ellipse(endX, receptacleY, 14 * personalBloom * lilyData.scale, 10 * personalBloom * lilyData.scale, 0, 0, Math.PI);
                ctx.fill();

                const petalAngleSpread = (Math.PI / 2.7) * personalBloom;
                const lilyRotation = Math.PI + lilyData.angleOffset;

                drawRealisticPetal(endX, endY, lilyData.scale, lilyRotation + petalAngleSpread, personalBloom, lilyData.colorType);
                drawRealisticPetal(endX, endY, lilyData.scale, lilyRotation - petalAngleSpread, personalBloom, lilyData.colorType);
                drawRealisticPetal(endX, endY, lilyData.scale * 1.05, lilyRotation, personalBloom, lilyData.colorType);

                const backSpread = petalAngleSpread * 0.55;
                drawRealisticPetal(endX, endY, lilyData.scale * 0.95, lilyRotation + Math.PI / 3 + backSpread, personalBloom, lilyData.colorType);
                drawRealisticPetal(endX, endY, lilyData.scale * 0.95, lilyRotation - Math.PI / 3 - backSpread, personalBloom, lilyData.colorType);
                drawRealisticPetal(endX, endY, lilyData.scale * 0.95, lilyRotation + Math.PI, personalBloom, lilyData.colorType);

                if (personalBloom > 0.15) {
                    drawPistilAndStamens(endX, endY, lilyRotation, lilyData.scale, personalBloom, lilyData.colorType);
                }

                if (personalBloom > 0.4 && Math.random() < 0.28) {
                    const particleColor = lilyData.colorType === 'pink' ? 'rgba(255, 192, 203, ' : 'rgba(255, 245, 200, ';
                    particles.push({
                        x: endX + (Math.random() - 0.5) * 45,
                        y: endY - 10,
                        vx: (Math.random() - 0.5) * 1.8,
                        vy: -Math.random() * 2.2 - 0.6,
                        alpha: 1.0,
                        size: Math.random() * 4.0 + 1.2,
                        color: particleColor
                    });
                }
            }
        }

        function drawLilyBouquet(startX, startY) {
            ['back', 'mid', 'front'].forEach(currentLayer => {
                lilies.forEach(lily => {
                    if (lily.layer === currentLayer) {
                        drawSingleLily(startX, startY, lily);
                    }
                });
            });

            ctx.shadowBlur = 15;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.008;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.shadowColor = 'rgba(255, 220, 150, 0.7)';
                ctx.fillStyle = `${p.color}${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
    </script>
</body>
</html>
